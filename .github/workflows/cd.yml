name: CD

on:
  push:
    branches: [main]

# Serialize deploys — prevents a slow rollout from racing with the next push.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  KUBECTL_VERSION: v1.36.2 # matches the k3s server (v1.36.2+k3s1)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch image (ADR-021): k3s mixes amd64 (daniel-ubuntu) and arm64
      # (OCI Ampere, Mac Mini VM) nodes. QEMU only emulates the runtime stage;
      # the Gradle build stage runs natively once (Dockerfile BUILDPLATFORM pin).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dacaitac/hyperbrain-core:latest
            ghcr.io/dacaitac/hyperbrain-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      # ADR-021 F9' — same pattern as HyperBrain-Infra/deploy.yml: ephemeral
      # Tailscale peer → kubeconfig → kubectl set image (SHA-pinned for rollback
      # safety) → rollout status → health check via port-forward.
      # Required secrets in the `production` environment:
      #   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  OAuth client (tag:ci)
      #   KUBECONFIG_B64                        base64 kubeconfig (server: 100.110.72.116:6443)
      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.98.8

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: ${{ env.KUBECTL_VERSION }}

      # Force Tailscale to establish the direct peer route to OCI before any
      # kubectl call — ephemeral peers need NAT-traversal warmup.
      - name: Warm up Tailscale route to OCI
        run: |
          for i in $(seq 1 12); do
            tailscale ping --c 1 100.110.72.116 && break
            echo "ping attempt $i failed, retrying in 5s…"
            sleep 5
          done

      - name: Configure kubeconfig
        run: |
          install -m 700 -d "$RUNNER_TEMP/kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$RUNNER_TEMP/kube/config"
          chmod 600 "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          export KUBECONFIG="$RUNNER_TEMP/kube/config"
          kubectl version --request-timeout=60s

      # Pin to the exact SHA built above — safe to re-run (idempotent) and
      # allows rollback by re-running the previous workflow run.
      - name: Deploy new core image
        run: |
          kubectl set image deployment/hyperbrain-core \
            core=ghcr.io/dacaitac/hyperbrain-core:${{ github.sha }} \
            -n hyperbrain

      - name: Wait for rollout
        run: kubectl rollout status deployment/hyperbrain-core -n hyperbrain --timeout=10m

      # Health check via kubectl port-forward — avoids exec (no curl in JRE image)
      # and avoids the Tailscale proxy lookup (operator may not yet be provisioned).
      - name: Health check core
        run: |
          kubectl port-forward -n hyperbrain deploy/hyperbrain-core 18080:8080 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 12); do
            curl -sf http://localhost:18080/actuator/health && break
            echo "attempt $i…"; sleep 5
          done
          kill $PF_PID 2>/dev/null || true
