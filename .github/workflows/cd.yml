name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch image (ADR-021): k3s mixes amd64 (daniel-ubuntu) and arm64
      # (OCI Ampere, Mac Mini VM) nodes. QEMU only emulates the runtime stage;
      # the Gradle build stage runs natively once (Dockerfile BUILDPLATFORM pin).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dacaitac/hyperbrain-core:latest
            ghcr.io/dacaitac/hyperbrain-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, daniel-ubuntu]
    environment: production
    steps:
      # docker-compose.yml lives at ~/hyperbrain-deploy, kept in sync by
      # HyperBrain-Infra/deploy.yml on every merge to its main. This job only
      # refreshes the hyperbrain-core service image, never touches the rest
      # of the stack (--no-deps).
      - name: Pull new image and restart service
        run: |
          docker pull ghcr.io/dacaitac/hyperbrain-core:latest
          docker compose -f ~/hyperbrain-deploy/docker-compose.yml --env-file ~/hyperbrain-deploy/.env up -d --no-deps hyperbrain-core

      - name: Health check
        # Published ports bind to BIND_ADDRESS (Tailscale IP in production,
        # HyperBrain-Infra hardening), so localhost is not listening.
        run: |
          sleep 10
          BIND=$(grep -oP '^BIND_ADDRESS=\K.*' ~/hyperbrain-deploy/.env || echo 127.0.0.1)
          curl -f "http://${BIND}:8080/actuator/health" || exit 1
