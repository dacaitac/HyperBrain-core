# Integration-test profile: Spring Boot context for @SpringBootTest + Testcontainers.
# Containers (PostgreSQL, LocalStack) are started by ContainersConfiguration.
# Flyway is enabled here to provision the ephemeral DB from V1__init.sql
# (the real Compose DB uses supabase/migrations/ instead — see S0-07, issue #29).
spring:
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Outbox scheduling is off so tests drive drainBatch()/purgeExpired() deterministically.
# The inbound SQS consumer is off by default so only the tests that need it (SqsConsumerIT,
# via @TestPropertySource) run a listener — otherwise competing listeners from cached contexts
# would steal messages from the shared sync-events.fifo queue.
app:
  sync:
    consumer:
      enabled: false
    results-consumer:
      enabled: false
  user-commands:
    # Off by default for the same competing-listener reason; UserCommandConsumerIT switches it on
    # via @TestPropertySource so exactly one context polls user-commands.fifo.
    consumer:
      enabled: false
  outbox:
    scheduling-enabled: false
    # OutboxListenConnection is off so OutboxWorkerIT can drive drainBatch() manually without
    # async interference from the background listener thread.
    notify-listen-enabled: false
  timeblock:
    # Tests drive expireDueBlocks() deterministically (TimeBlockExpiryIT).
    scheduling-enabled: false
  telemetry:
    # Off by default for the same competing-listener reason; TelemetryConsumerIT switches it on via
    # @TestPropertySource so exactly one context polls telemetry-events.
    consumer:
      enabled: false
    rollup:
      # Tests drive rollup() deterministically (DailyAdherenceRollupServiceIT); scheduler off.
      scheduling-enabled: false
    retention:
      # Tests drive purgeExpired() deterministically (TelemetryConsumerIT); scheduler off.
      scheduling-enabled: false
  prioritizer:
    # Tests drive reflectDailyReprioritization() deterministically (PriorityReflectionIT).
    scheduling-enabled: false
  planner:
    delivery:
      # Tests drive dispatchIfDue() deterministically (MorningAgendaDispatchIT); scheduler off.
      lead-offset-minutes:        10
      hysteresis-margin-minutes:  15
      trigger-tolerance-minutes:  5
      scheduling-enabled: false
