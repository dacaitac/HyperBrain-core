spring:
  application:
    name: hyperbrain-core

  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/hyperbrain}
    username: ${DB_USER:hyperbrain}
    password: ${DB_PASSWORD:hyperbrain}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled:   true
    locations: classpath:db/migration
    baseline-on-migrate: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key:  ${AWS_ACCESS_KEY_ID:}
        secret-key:  ${AWS_SECRET_ACCESS_KEY:}
      sqs:
        queues:
          sync-events: ${SQS_QUEUE_SYNC_EVENTS:sync-events.fifo}
          core-events: ${SQS_QUEUE_CORE_EVENTS:core-events}
          ia-jobs:     ${SQS_QUEUE_IA_JOBS:ia-jobs}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
