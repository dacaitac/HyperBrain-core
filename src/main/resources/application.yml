spring:
  application:
    name: hyperbrain-core

  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/hyperbrain}
    username: ${DB_USER:hyperbrain}
    password: ${DB_PASSWORD:hyperbrain}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    # Disabled in the default (runtime) profile: the real DB is managed by Supabase CLI
    # migrations (supabase/migrations/), not Flyway. Flyway runs only in the
    # integration-test profile against an ephemeral Testcontainers DB (see S0-07, issue #29).
    enabled:   false
    locations: classpath:db/migration
    baseline-on-migrate: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key:  ${AWS_ACCESS_KEY_ID:}
        secret-key:  ${AWS_SECRET_ACCESS_KEY:}
      sqs:
        # Dev/local uses LocalStack; MVP production uses AWS SQS real (free tier) — see ADR-001, ADR-006.
        # Set AWS_SQS_ENDPOINT_OVERRIDE to the LocalStack URL for local dev; unset it for real AWS.
        # Compose overrides to the internal Docker network hostname (see docker-compose.yml).
        endpoint: ${AWS_SQS_ENDPOINT_OVERRIDE:http://localhost:4566}
        queues:
          sync-events: ${SQS_QUEUE_SYNC_EVENTS:sync-events.fifo}
          core-events: ${SQS_QUEUE_CORE_EVENTS:core-events}
          ia-jobs:     ${SQS_QUEUE_IA_JOBS:ia-jobs}
          apple-commands:         ${SQS_QUEUE_APPLE_COMMANDS:apple-commands.fifo}
          apple-commands-results: ${SQS_QUEUE_APPLE_COMMANDS_RESULTS:apple-commands-results.fifo}

app:
  sync:
    consumer:
      enabled: true
    results-consumer:
      # Listener of apple-commands-results.fifo; disable while the queue is not provisioned
      # (a missing queue fails the listener container at startup).
      enabled: ${SYNC_RESULTS_CONSUMER_ENABLED:true}
    # Single-user MVP: every inbound Apple event is owned by this user.
    # Override via SYNC_DEFAULT_USER_ID env var in production.
    default-user-id: ${SYNC_DEFAULT_USER_ID:00000000-0000-0000-0000-000000000001}
    # Notion write-back (HU-10). Disabled unless a token is provisioned (SOPS in Infra, CA-12);
    # the data source ids are the Tasks/Cycles collections verified in issue #15.
    notion:
      enabled: ${NOTION_SYNC_ENABLED:false}
      token: ${NOTION_TOKEN:}
      tasks-data-source-id: ${NOTION_TASKS_DATA_SOURCE_ID:1bf8bc9c5d918171b7ea000b7e326082}
      cycles-data-source-id: ${NOTION_CYCLES_DATA_SOURCE_ID:1bf8bc9c5d9181e78737000b45812f45}
  outbox:
    poll-interval-ms:   2000
    batch-size:         50
    retention-days:     7
    scheduling-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
