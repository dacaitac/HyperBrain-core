spring:
  application:
    name: hyperbrain-core

  # Virtual threads for Tomcat, @Async and task scheduling (HU-14 CA-14). The outbox drain
  # additionally runs its propagators on a dedicated virtual-thread executor (PipelineConfig).
  threads:
    virtual:
      enabled: true

  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/hyperbrain}
    username: ${DB_USER:hyperbrain}
    password: ${DB_PASSWORD:hyperbrain}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    # Disabled in the default (runtime) profile: the real DB is managed by Supabase CLI
    # migrations (supabase/migrations/), not Flyway. Flyway runs only in the
    # integration-test profile against an ephemeral Testcontainers DB (see S0-07, issue #29).
    enabled:   false
    locations: classpath:db/migration
    baseline-on-migrate: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key:  ${AWS_ACCESS_KEY_ID:}
        secret-key:  ${AWS_SECRET_ACCESS_KEY:}
      sqs:
        # Dev/local uses LocalStack; MVP production uses AWS SQS real (free tier) — see ADR-001, ADR-006.
        # Set AWS_SQS_ENDPOINT_OVERRIDE to the LocalStack URL for local dev; unset it for real AWS.
        # Compose overrides to the internal Docker network hostname (see docker-compose.yml).
        endpoint: ${AWS_SQS_ENDPOINT_OVERRIDE:http://localhost:4566}
        queues:
          sync-events: ${SQS_QUEUE_SYNC_EVENTS:sync-events.fifo}
          core-events: ${SQS_QUEUE_CORE_EVENTS:core-events}
          ia-jobs:     ${SQS_QUEUE_IA_JOBS:ia-jobs}
          apple-commands:         ${SQS_QUEUE_APPLE_COMMANDS:apple-commands.fifo}
          apple-commands-results: ${SQS_QUEUE_APPLE_COMMANDS_RESULTS:apple-commands-results.fifo}
          user-commands:          ${SQS_QUEUE_USER_COMMANDS:user-commands.fifo}

  # Spring AI (HU-01c H3/H4). The Anthropic provider autoconfiguration is DISABLED by default via
  # spring.ai.model.chat=none, so the app and the whole test suite boot WITHOUT an API key (local/CI
  # never hold SPRING_AI_ANTHROPIC_API_KEY). Production turns the live LLM on by overriding
  # spring.ai.model.chat=anthropic together with SPRING_AI_ANTHROPIC_API_KEY and the
  # app.cognitive.llm-propose flag. Tests always drive a deterministic stub — never a real call.
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    anthropic:
      api-key: ${SPRING_AI_ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_ANTHROPIC_MODEL:claude-sonnet-5}
          # Reproducibility comes from bounding the output space (closed blockId set + JSON schema +
          # ProposalWallGuard), not from sampling. Temperature is NOT sent at all: newer Claude models
          # (Opus 4.8, Sonnet 5) reject the deprecated `temperature` param, and Spring AI would otherwise
          # send its 0.8 default. CognitiveLlmAutoConfiguration builds the model with a null-temperature
          # default so the outgoing request omits the field (see the temperature-free ChatModel there).
          # max-tokens is the OUTPUT budget: a full-day prompt (15-20+ blocks) with Sonnet 5 exhausted
          # the old 8192 and returned an empty completion (stop_reason=max_tokens, no text block), so it
          # degraded to the floor on every large run. Raised with ample headroom; env-tunable.
          max-tokens: ${SPRING_AI_ANTHROPIC_MAX_TOKENS:16000}

app:
  cognitive:
    llm-propose:
      # HU-01c H3: the LLM propose-then-validate tier. Deploy-safe default OFF — the planner
      # materializes the humanized floor exactly as H1/H2 (zero regression). Enable in prod via
      # APP_COGNITIVE_LLM_PROPOSE_ENABLED=true, together with spring.ai.model.chat=anthropic and
      # SPRING_AI_ANTHROPIC_API_KEY. Local/CI never turn it on against a real provider.
      enabled: ${APP_COGNITIVE_LLM_PROPOSE_ENABLED:false}
  sync:
    consumer:
      enabled: true
      # Batch + long-polling tunables for SqsMessageListenerContainerFactory (CA-6, CA-9).
      # max-messages-per-poll: maps to SQS MaxNumberOfMessages (max 10 per API constraint).
      max-messages-per-poll: 10
      # wait-time-seconds: maps to SQS WaitTimeSeconds; long-poll eliminates empty polls.
      wait-time-seconds: 20
      # visibility-timeout-seconds: how long a received message stays invisible in SQS.
      # Criterion: p99 ingestion path (dedup + DB write + optional Notion write-back) ≈ 10 s;
      # 3× safety margin = 30 s to absorb transient DB/Notion latency spikes.
      visibility-timeout-seconds: 30
    results-consumer:
      # Listener of apple-commands-results.fifo; disable while the queue is not provisioned
      # (a missing queue fails the listener container at startup).
      enabled: ${SYNC_RESULTS_CONSUMER_ENABLED:true}
    # Single-user MVP: every inbound Apple event is owned by this user.
    # Override via SYNC_DEFAULT_USER_ID env var in production.
    default-user-id: ${SYNC_DEFAULT_USER_ID:00000000-0000-0000-0000-000000000001}
    # Notion write-back (HU-10). Disabled unless a token is provisioned (SOPS in Infra, CA-12);
    # the data source ids are the Tasks/Cycles collections verified in issue #15.
    notion:
      enabled: ${NOTION_SYNC_ENABLED:false}
      token: ${NOTION_TOKEN:}
      tasks-data-source-id: ${NOTION_TASKS_DATA_SOURCE_ID:1bf8bc9c5d918171b7ea000b7e326082}
      cycles-data-source-id: ${NOTION_CYCLES_DATA_SOURCE_ID:1bf8bc9c5d9181e78737000b45812f45}
      # Database ids of the same DBs (HU-14): webhook payloads may reference the parent as a
      # database_id (automations) or a data_source_id (subscription); both are matched.
      tasks-database-id: ${NOTION_TASKS_DATABASE_ID:1bf8bc9c5d91812b8c97e5e6450858aa}
      cycles-database-id: ${NOTION_CYCLES_DATABASE_ID:1bf8bc9c5d9181d882cfe1f4aa38f295}
  user-commands:
    consumer:
      # Listener of user-commands.fifo (HU-01b slice 2: «calcular» button + Sleep Score input).
      # Deploy-safe default OFF: a missing queue fails the listener container at startup, and the
      # queue is not provisioned until the Infra rollout. Enable in prod via
      # USER_COMMANDS_CONSUMER_ENABLED=true once user-commands.fifo (+ DLQ) exists.
      enabled: ${USER_COMMANDS_CONSUMER_ENABLED:false}
    # A REPLAN_AGENDA whose occurred_at is older than this bound (consumer backlog after downtime)
    # is discarded with a WARN instead of replanning from a long-gone instant (Daniel, 2026-07-11).
    replan-staleness-hours: 2
  outbox:
    # Primary drain trigger is LISTEN/NOTIFY (OutboxListenConnection). This poll runs as a
    # backup at a long interval to recover events that survived a connection drop or restart.
    poll-interval-ms:   30000
    batch-size:         50
    retention-days:     7
    scheduling-enabled: true
    notify-listen-enabled: true
  timeblock:
    # DR-08 expiry sweep (ADR-013): open blocks whose date_end passed settle as EXPIRED.
    # One-minute cadence is enough — settlement is idempotent and race-safe.
    expiry-poll-ms:     60000
    scheduling-enabled: true
  telemetry:
    rollup:
      # H0 (#17): daily adherence + behavioral lead-measures rollup. Structured JSON line to stdout —
      # the MVP telemetry sink (ADR-016 raw-first, no new table). Runs early over the PREVIOUS local
      # day: after the DR-08 expiry sweep has settled yesterday's open blocks and before the
      # wake-triggered morning dispatch overwrites the ritual proxy.
      cron:               "0 30 3 * * *"
      scheduling-enabled: true
      # DOMAIN FORMULA (pending Daniel): a block counts as executed when its settled actual duration
      # reaches this floor (temporal tolerance, minutes).
      executed-min-minutes:            5
      # DOMAIN FORMULA (pending Daniel): a day whose adherence is below this with zero replans is
      # flagged abandoned (a day let go, not one actively re-adjusted).
      abandonment-adherence-threshold: 0.5
  prioritizer:
    # #66a tick (a): recompute the day's Priority Scores as the urgency ramp advances and reflect
    # only the moved rows to the satellites. Hourly, anchored to America/Bogota (see the scheduler).
    tick-cron:          "0 0 * * * *"
    scheduling-enabled: true
  planner:
    materialization:
      # HU-01c H2 single-owner cut-over. OFF (default) = legacy synchronous path intact (the morning
      # dispatch and the manual replan generate in-process) — the cut-over deploys inert. ON = the
      # triggers emit a DailyAgendaRequestedEvent to ia-jobs and AgendaJobConsumer is the sole
      # materializer. Flip is a gated decision by Daniel, paired with agenda-job-consumer.enabled.
      async-enabled: ${APP_PLANNER_MATERIALIZATION_ASYNC_ENABLED:false}
    agenda-job-consumer:
      # Listener of ia-jobs for DailyAgendaRequestedEvent (HU-01c H2). Deploy-safe default OFF: the
      # single-owner path stays dark until the cut-over. Enable in prod via
      # APP_PLANNER_AGENDA_JOB_CONSUMER_ENABLED=true together with the async-enabled flip.
      enabled: ${APP_PLANNER_AGENDA_JOB_CONSUMER_ENABLED:false}
      # Visibility margin the consumer extends each job to on receipt (heartbeat seam): matches the
      # ia-jobs queue sizing (120 s) so a long run (LLM tier, H3+) is not redelivered mid-flight. The
      # listener factory default is 30 s (see app.sync.consumer.visibility-timeout-seconds).
      visibility-timeout-seconds: 120
    delivery:
      # HU-01b morning dispatch: fire at estimated-wake + lead-offset, clamped ±hysteresis vs.
      # yesterday's trigger (the 5-night wake median carries ~±40 min error). The poll cron cadence
      # equals trigger-tolerance-minutes so no trigger window is missed between ticks.
      lead-offset-minutes:        10
      hysteresis-margin-minutes:  15
      trigger-tolerance-minutes:  5
      poll-cron:          "0 */5 * * * *"
      # Deploy-safe default OFF (HU-01b): morning dispatch stays dark until the SentinelAPI
      # write-back + "HyperBrain" calendar are live on the Mac Mini. Enable in prod via
      # APP_PLANNER_DELIVERY_SCHEDULING_ENABLED=true once the rollout choreography is done.
      scheduling-enabled: false
    humanize:
      # H1 humanized deterministic floor (HU-01c): turns the raw back-to-back placement into a day a
      # human can live, and doubles as the DEGRADED fallback of ADR-019. EVERY value below is a
      # sanctioned MVP default PENDING DANIEL's ratification (like the H0 tolerances) — not an
      # invented formula.
      # Rule 1 — short spacing left after each execution block (never written back to Apple).
      transition-buffer-minutes: 5
      # Rule 2 — protected meal anchors the floor never fills with work. Local wall-clock times,
      # resolved against the user's zone (America/Bogota in prod).
      meals:
        - label: lunch
          start: "12:30"
          end:   "13:30"
        - label: dinner
          start: "19:00"
          end:   "20:00"
      # Rule 3 — minimum viable block; shorter placements are dropped as slivers, never fragmenting.
      min-block-minutes: 15
      # Rule 4 — DOMAIN FORMULA (pending Daniel): priority-score band within which same-context work is
      # regrouped adjacently. A tie-break inside a band, never a reordering across priority bands.
      batch-band-width: 0.10
      # Rule 6 — occupancy band: the day is never packed past the max; the min is aspirational (the
      # floor never invents work to reach it).
      occupancy-min-fraction: 0.75
      occupancy-max-fraction: 0.85

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
